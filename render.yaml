services:
  - type: web
    name: hdb-insights-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn hdb_insights_backend.app:app
    envVars:
      - key: PORT
        value: 10000
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: hdb-database
          property: connectionString
      - key: POSTGRES_HOST
        fromDatabase:
          name: hdb-database
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: hdb-database
          property: port
      - key: POSTGRES_DB
        fromDatabase:
          name: hdb-database
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: hdb-database
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: hdb-database
          property: password
      - key: GEMINI_API_KEY
        sync: false
      - key: MODEL
        value: gemini-3.1-flash-lite

databases:
  - name: hdb-database
    plan: free
